<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0F1923;color:#E8F4F2;font-family:system-ui,-apple-system,sans-serif;font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{background:#0F1923;color:#E8F4F2;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#1C2B3A;border-bottom:1px solid #2E4560;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:20;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.topbar-title{font-size:13px;font-weight:700;color:#00C9B1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conn-pill{display:flex;align-items:center;gap:4px;font-size:10px;color:#7A9BB5;background:#0F1923;border:1px solid #2E4560;border-radius:20px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#E8484A;transition:background .4s;flex-shrink:0}
.conn-dot.ok{background:#4CAF7D}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.lock-btn{display:flex;align-items:center;gap:5px;background:#243447;border:1px solid #2E4560;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;color:#E8F4F2;transition:border-color .2s;border:none}
.lock-btn.locked{border:1px solid #E8484A;color:#E8484A}
.lock-btn.unlocked{border:1px solid #4CAF7D;color:#4CAF7D}
.user-btn{display:flex;align-items:center;gap:6px;background:#243447;border:1px solid #2E4560;border-radius:8px;padding:5px 10px;cursor:pointer;position:relative}
.user-btn:hover{border-color:#00C9B1}
.user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#00C9B1,#7C5CBF);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0F1923;flex-shrink:0}
.user-menu{position:absolute;top:calc(100% + 6px);right:0;background:#1C2B3A;border:1px solid #2E4560;border-radius:10px;min-width:230px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.6);overflow:hidden}
.user-menu-item{padding:10px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:#E8F4F2;transition:background .15s;border:none;background:none;width:100%;text-align:left}
.user-menu-item:hover{background:#243447}
.user-menu-item i{font-size:15px;color:#7A9BB5;width:18px;flex-shrink:0}
.user-menu-sep{height:1px;background:#2E4560;margin:3px 0}
.tabs{display:flex;background:#0F1923;border-bottom:1px solid #2E4560;overflow-x:auto;position:sticky;top:49px;z-index:19;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border:none;background:none;color:#7A9BB5;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s}
.tab.active{color:#00C9B1;border-bottom-color:#00C9B1}
.tab:hover:not(.active){color:#E8F4F2}
.content{padding:12px;flex:1;background:#0F1923;color:#E8F4F2;max-width:1000px;width:100%;margin:0 auto}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:6px;border:none;font-size:12px;cursor:pointer;font-weight:500;line-height:1.3;transition:opacity .15s;color:inherit}
.btn:active{opacity:.7}
.btn-accent{background:#00C9B1;color:#0F1923}
.btn-outline{background:transparent;color:#00C9B1;border:1px solid #00C9B1}
.btn-warn{background:#F5A623;color:#1a0800}
.btn-danger{background:#E8484A;color:#fff}
.btn-ghost{background:transparent;color:#7A9BB5;border:1px solid #2E4560}
.btn-ghost:hover{color:#E8F4F2;border-color:#7A9BB5}
.btn-purple{background:#7C5CBF;color:#fff}
.btn-green{background:#4CAF7D;color:#0F1923}
.btn-sm{padding:3px 8px;font-size:11px}
.card{background:#1C2B3A;border:1px solid #2E4560;border-radius:10px;overflow:hidden;margin-bottom:10px}
.card-body{padding:10px 13px}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(46,69,96,.4)}
.row:last-child{border-bottom:none}
.row-clickable{cursor:pointer;transition:background .1s}
.row-clickable:hover{background:rgba(46,69,96,.2);border-radius:6px;padding-left:4px;padding-right:4px}
.item-name{font-weight:500;color:#E8F4F2;font-size:13px}
.item-sub{font-size:11px;color:#7A9BB5;margin-top:1px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-stock{background:rgba(0,201,177,.15);color:#00C9B1}
.b-uso{background:rgba(245,166,35,.15);color:#F5A623}
.b-low{background:rgba(232,72,74,.15);color:#E8484A}
.b-zero{background:rgba(122,155,181,.1);color:#7A9BB5}
.b-total{background:rgba(76,175,125,.15);color:#4CAF7D}
.b-purple{background:rgba(124,92,191,.15);color:#A78BFA}
.b-paila{background:rgba(0,201,177,.15);color:#00C9B1}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:12px}
.stat{background:#1C2B3A;border:1px solid #2E4560;border-radius:8px;padding:9px 11px;cursor:default;transition:border-color .2s}
.stat.clickable{cursor:pointer}
.stat.clickable:hover{border-color:#00C9B1}
.stat.active-filter{border-color:#00C9B1;background:#1a3347}
.stat-val{font-size:19px;font-weight:600;color:#00C9B1}
.stat-lbl{font-size:10px;color:#7A9BB5;margin-top:1px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:10px}
.modal{background:#1C2B3A;border:1px solid #2E4560;border-radius:12px;padding:16px;width:380px;max-width:100%;color:#E8F4F2;max-height:92vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#E8F4F2;display:flex;align-items:center;gap:7px}
.field{margin-bottom:9px}
.field label{display:block;font-size:11px;color:#7A9BB5;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;background:#0F1923;border:1px solid #2E4560;border-radius:6px;padding:7px 10px;color:#E8F4F2;-webkit-text-fill-color:#E8F4F2;font-size:13px;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#00C9B1}
.field select option{background:#1C2B3A;color:#E8F4F2}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.flow-bar{display:flex;align-items:center;gap:5px;padding:5px 14px;background:#243447;border-bottom:1px solid #2E4560;font-size:11px;flex-wrap:wrap}
.sec-title{font-size:10px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:2px}
.empty{text-align:center;padding:28px 16px;color:#7A9BB5}
.empty i{font-size:26px;display:block;margin-bottom:7px}
.search-wrap{margin-bottom:10px}
.search{width:100%;background:#1C2B3A;border:1px solid #2E4560;border-radius:6px;padding:7px 12px;color:#E8F4F2;-webkit-text-fill-color:#E8F4F2;font-size:13px;outline:none;-webkit-appearance:none;display:block}
.search::placeholder{color:#7A9BB5}
.search:focus{border-color:#00C9B1}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.chip{padding:3px 9px;border-radius:20px;border:1px solid #2E4560;background:transparent;color:#7A9BB5;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.active{background:rgba(0,201,177,.15);border-color:#00C9B1;color:#00C9B1}
.warn-box{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:8px;padding:8px 11px;margin-bottom:9px;font-size:12px;color:#F5A623}
.info-box{background:rgba(0,201,177,.08);border:1px solid rgba(0,201,177,.2);border-radius:8px;padding:8px 11px;margin-bottom:9px;font-size:12px;color:#00C9B1}
.danger-box{background:rgba(232,72,74,.08);border:1px solid rgba(232,72,74,.25);border-radius:8px;padding:8px 11px;margin-bottom:9px;font-size:12px;color:#E8484A}
.spinner{width:32px;height:32px;border:3px solid #2E4560;border-top-color:#00C9B1;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{position:fixed;inset:0;background:#0F1923;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 16px;gap:12px}
.lock-screen i{font-size:36px;color:#7C5CBF}
.pin-input{background:#0F1923;border:1px solid #2E4560;border-radius:8px;padding:10px 14px;color:#E8F4F2;-webkit-text-fill-color:#E8F4F2;font-size:18px;text-align:center;width:180px;letter-spacing:4px;outline:none;-webkit-appearance:none}
.pin-input:focus{border-color:#7C5CBF}
.log-entry{padding:6px 0;border-bottom:1px solid rgba(46,69,96,.35);display:flex;gap:9px;align-items:flex-start}
.log-entry:last-child{border-bottom:none}
.log-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.pedido-card{background:#1C2B3A;border:1px solid #2E4560;border-radius:10px;padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .2s}
.pedido-card:hover{border-color:#A78BFA}
.chart-bar-wrap{margin-bottom:7px}
.chart-bar-label{font-size:11px;color:#E8F4F2;margin-bottom:2px;display:flex;justify-content:space-between}
.chart-bar-bg{background:#0F1923;border-radius:4px;height:14px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;background:#00C9B1}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:#243447;border:1px solid #2E4560;font-size:12px;color:#E8F4F2}
.tag button{background:none;border:none;cursor:pointer;color:#7A9BB5;font-size:12px;padding:0;line-height:1}
.tag button:hover{color:#E8484A}
.sort-select{background:#1C2B3A;border:1px solid #2E4560;border-radius:6px;padding:3px 8px;color:#7A9BB5;font-size:11px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
.section-divider{height:1px;background:#2E4560;margin:12px 0}
@media print{
  .topbar,.tabs,.flow-bar,.no-print{display:none!important}
  body{background:#fff;color:#000}
  .print-area{display:block!important}
}
.print-area{display:none}
</style>
</head>

const $  = id => document.getElementById(id);
const txt = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ts  = () => new Date().toLocaleString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
const tsDate = () => new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});
const mk  = (d=new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const mkLabel = k => { const [y,m]=k.split('-'); return new Date(y,m-1,1).toLocaleDateString('es-CO',{month:'long',year:'numeric'}); };
const parseTs = s => { try{ const[dp,tp]=s.split(', ');const[d,m,y]=dp.split('/');const[h,mn]=tp.split(':');return new Date(y,m-1,d,h,mn); }catch{return null;} };

function setConn(ok){ const d=$('connDot'),t=$('connTxt'); if(d)d.className='conn-dot'+(ok?' ok':''); if(t)t.textContent=ok?'En línea · tiempo real':'Reconectando...'; }
function hideLoading(){ $('loading').style.display='none'; $('app').style.display='flex'; updateLockUI(); }
function updateLockUI(){
  const btn=$('lockBtn'),icon=$('lockIcon'),lbl=$('lockTxt'),nb=$('newItemBtn');
  if(!btn) return;
  if(ST.addLocked){ btn.className='lock-btn locked'; icon.className='ti ti-lock'; lbl.textContent='Agregar'; if(nb){nb.style.opacity='.4';nb.style.pointerEvents='none';} }
  else{ btn.className='lock-btn unlocked'; icon.className='ti ti-lock-open'; lbl.textContent='Bloqueado'; if(nb){nb.style.opacity='1';nb.style.pointerEvents='auto';} }
}

window.setTab=(t,el)=>{
  ST.tab=t; ST.searchQ=''; ST.catFilter=''; ST.statFilter='';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');

window.setTabDirect=(t)=>{
  ST.tab=t; ST.searchQ=''; ST.catFilter=''; ST.statFilter='';
  const map=['total','almacen','lab','paila','uso','log','pedidos','remisiones','salidas','reportes'];
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',map[i]===t));

function render(){
  const c=$('content'); if(!c) return;
  const t=ST.tab;
  if(t==='total')        c.innerHTML=renderTotal();
  else if(t==='almacen')  c.innerHTML=renderAlmacen();
  else if(t==='lab')      c.innerHTML=renderLab();
  else if(t==='paila')    c.innerHTML=renderPaila();
  else if(t==='uso')      c.innerHTML=renderUso();
  else if(t==='log')      c.innerHTML=renderLog();
  else if(t==='pedidos')  c.innerHTML=renderPedidos();
  else if(t==='remisiones')c.innerHTML=renderRemisiones();
  else if(t==='salidas')   c.innerHTML=renderSalidas();
  else if(t==='reportes')  c.innerHTML=renderReportes();
  else if(t==='papelera') c.innerHTML=renderPapelera();
  rebindSearch();
}

// ── SEARCH: bind input events after render without replacing element ──────────
function rebindSearch(){
  const inp=$('mainSearch');
  if(inp && !inp._bound){
    inp._bound=true;
    inp.addEventListener('input', function(){ ST.searchQ=this.value; renderList(); });
  }
}

// Renders only the list portion (card) without re-rendering stats/filters
function renderList(){
  const listEl=$('itemList');
  if(!listEl){ render(); return; }
  const t=ST.tab;
  if(t==='total')       listEl.innerHTML=listTotal();
  else if(t==='almacen')listEl.innerHTML=listAlmacen();
  else if(t==='lab')    listEl.innerHTML=listLab();
  else if(t==='paila')  listEl.innerHTML=listPaila();
  else if(t==='uso')    listEl.innerHTML=listUso();
  else if(t==='log')    listEl.innerHTML=listLog();
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function applyFilters(source){
  let r=[...source];
  if(ST.catFilter)  r=r.filter(i=>i.cat===ST.catFilter);
  if(ST.statFilter==='bajo')    r=r.filter(i=>(i.almacen+i.lab)>0&&(i.almacen+i.lab)<=i.min);
  if(ST.statFilter==='agotado') r=r.filter(i=>!i.almacen&&!i.lab);
  if(ST.searchQ){ const q=ST.searchQ.toLowerCase(); r=r.filter(i=>i.name.toLowerCase().includes(q)||i.cat.toLowerCase().includes(q)); }
  if(ST.sortBy==='name')    r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(ST.sortBy==='stock')   r.sort((a,b)=>(b.almacen+b.lab)-(a.almacen+a.lab));
  else if(ST.sortBy==='almacen') r.sort((a,b)=>b.almacen-a.almacen);
  else if(ST.sortBy==='lab')     r.sort((a,b)=>b.lab-a.lab);
  else if(ST.sortBy==='uso')     r.sort((a,b)=>(b.usoItems?.length||0)-(a.usoItems?.length||0));
  return r;
}

function searchBarHTML(ph='Buscar insumo...'){

    <input class="search" id="mainSearch" placeholder="${ph}" value="${txt(ST.searchQ)}" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">

}
function filterBarHTML(){
  return `<div class="filter-bar">

// ── TOTAL ─────────────────────────────────────────────────────────────────────
function renderTotal(){
  const tA=items.reduce((a,i)=>a+i.almacen,0);
  const tL=items.reduce((a,i)=>a+i.lab,0);
  const tP=items.reduce((a,i)=>a+(i.paila||0),0);
  const tLabs=tL+tP; // Lab + Paila juntos como "Laboratorio"
  const tS=tA+tLabs;
  const tU=items.reduce((a,i)=>a+(i.usoItems?.length||0)+(i.pailaUsoItems?.length||0),0);
  const nBajos=items.filter(i=>(i.almacen+i.lab+(i.paila||0))>0&&(i.almacen+i.lab+(i.paila||0))<=i.min).length;
  const nAgot=items.filter(i=>!i.almacen&&!i.lab&&!(i.paila||0)).length;
  return `<div class="stats">
    <div class="stat"><div class="stat-val" style="color:#4CAF7D">${tS}</div><div class="stat-lbl">Total stock</div></div>
    <div class="stat"><div class="stat-val">${tA}</div><div class="stat-lbl">Almacén</div></div>
    <div class="stat"><div class="stat-val">${tLabs}</div><div class="stat-lbl">Lab + Paila</div></div>
    <div class="stat"><div class="stat-val" style="color:#F5A623">${tU}</div><div class="stat-lbl">En uso</div></div>
    <div class="stat clickable ${ST.statFilter==='bajo'?'active-filter':''}" onclick="window._setStatFilter('bajo')"><div class="stat-val" style="color:${nBajos?'#F5A623':'#00C9B1'}">${nBajos}</div><div class="stat-lbl">Stock bajo ${nBajos?'(ver)':''}</div></div>
    <div class="stat clickable ${ST.statFilter==='agotado'?'active-filter':''}" onclick="window._setStatFilter('agotado')"><div class="stat-val" style="color:${nAgot?'#E8484A':'#00C9B1'}">${nAgot}</div><div class="stat-lbl">Agotados ${nAgot?'(ver)':''}</div></div>
  </div>
  ${ST.statFilter?`<div class="info-box" style="margin-bottom:8px">Mostrando: <b>${ST.statFilter==='bajo'?'Stock bajo':'Agotados'}</b> · <button onclick="window._setStatFilter('')" style="background:none;border:none;color:#00C9B1;cursor:pointer;font-size:12px">✕ Quitar filtro</button></div>`:''}
  ${searchBarHTML()}${filterBarHTML()}
  <div id="itemList">${listTotal()}</div>`;
}
function listTotal(){
  const filtered=applyFilters(items);
  if(!filtered.length) return `<div class="empty"><i class="ti ti-stack"></i><span>Sin insumos${ST.searchQ||ST.catFilter||ST.statFilter?' que coincidan':''}</span></div>`;
  let h=`<div class="card"><div class="card-body">`;
  filtered.forEach(item=>{
    const paila=item.paila||0;
    const total=item.almacen+item.lab+paila;
    const euLab=item.usoItems?.length||0;
    const euPaila=item.pailaUsoItems?.length||0;
    const euTotal=euLab+euPaila;
    const low=total>0&&total<=item.min, zero=!total;
    const tb=zero?`<span class="badge b-zero">Agotado</span>`:low?`<span class="badge b-low">⚠ ${total}</span>`:`<span class="badge b-total">Total: ${total}</span>`;
    h+=`<div class="row row-clickable" onclick="window.openItemDetail('${item.id}')">
      <div style="flex:1;min-width:0">
        <div class="item-name">${txt(item.name)}</div>
        <div class="item-sub">${txt(item.cat)} · Almacén: <b style="color:#E8F4F2">${item.almacen}</b> · Lab: <b style="color:#E8F4F2">${item.lab}</b> · La Paila: <b style="color:#E8F4F2">${paila}</b>${euTotal?` · <span style="color:#F5A623">${euTotal} en uso</span>`:''}</div>
      </div>
      ${tb}
      <button class="btn btn-purple btn-sm" onclick="event.stopPropagation();window.quickPedir('${item.id}')" title="Agregar a pedido"${item._pedidoPendiente?' style="opacity:.5"':''}><i class="ti ti-shopping-cart"></i></button>
    </div>`;
  });
  return h+`</div></div>`;
}

    <div class="stat clickable ${ST.statFilter==='agotado'?'active-filter':''}" onclick="window._setStatFilter('agotado')"><div class="stat-val" style="color:${nAgot?'#E8484A':'#00C9B1'}">${nAgot}</div><div class="stat-lbl">Agotados ${nAgot?'(ver)':''}</div></div>

function listAlmacen(){

      ${badge}

// ── LABORATORIO ───────────────────────────────────────────────────────────────
function renderLab(){
  const tL=items.reduce((a,i)=>a+i.lab,0);
  const nBajos=items.filter(i=>(i.almacen+i.lab)>0&&(i.almacen+i.lab)<=i.min).length;
  const nAgot=items.filter(i=>!i.lab&&(i.usoItems?.length||0)>0).length; // agotado en lab pero con uso activo
  return `<div class="stats">
    <div class="stat"><div class="stat-val">${items.filter(i=>i.lab>0||(i.usoItems?.length||0)>0).length}</div><div class="stat-lbl">Tipos en lab</div></div>
    <div class="stat"><div class="stat-val">${tL}</div><div class="stat-lbl">Unidades en stock</div></div>
    <div class="stat"><div class="stat-val" style="color:#F5A623">${items.reduce((a,i)=>a+(i.usoItems?.length||0),0)}</div><div class="stat-lbl">En uso</div></div>
    <div class="stat clickable ${ST.statFilter==='bajo'?'active-filter':''}" onclick="window._setStatFilter('bajo')"><div class="stat-val" style="color:${nBajos?'#F5A623':'#00C9B1'}">${nBajos}</div><div class="stat-lbl">Stock bajo ${nBajos?'(ver)':''}</div></div>
    <div class="stat clickable ${ST.statFilter==='agotado'?'active-filter':''}" onclick="window._setStatFilter('agotado')"><div class="stat-val" style="color:${nAgot?'#E8484A':'#00C9B1'}">${nAgot}</div><div class="stat-lbl">Lab agotado+uso ${nAgot?'(ver)':''}</div></div>
  </div>
  ${ST.statFilter==='bajo'?`<div class="info-box" style="margin-bottom:8px"><b>Stock total bajo (almacén + laboratorio)</b> · <button onclick="window._setStatFilter('')" style="background:none;border:none;color:#00C9B1;cursor:pointer;font-size:12px">✕ Quitar filtro</button></div>`:''}
  ${ST.statFilter==='agotado'?`<div class="info-box" style="margin-bottom:8px"><b>Sin stock en lab pero con insumos en uso</b> · <button onclick="window._setStatFilter('')" style="background:none;border:none;color:#00C9B1;cursor:pointer;font-size:12px">✕ Quitar filtro</button></div>`:''}
  ${searchBarHTML()}${filterBarHTML()}
  <div id="itemList">${listLab()}</div>`;
}
function listLab(){
  let source;
  if(ST.statFilter==='bajo'){
    source=items.filter(i=>(i.almacen+i.lab)>0&&(i.almacen+i.lab)<=i.min);
  } else if(ST.statFilter==='agotado'){
    source=items.filter(i=>!i.lab&&(i.usoItems?.length||0)>0);
  } else {
    // Mostrar SIEMPRE los que tienen stock en lab O tienen algo en uso en lab
    source=items.filter(i=>i.lab>0||(i.usoItems?.length||0)>0||ST.searchQ||ST.catFilter);
  }
  const filtered=applyFilters(source);
  if(!filtered.length){
    if(ST.statFilter==='bajo') return `<div class="empty"><i class="ti ti-check"></i><span style="color:#4CAF7D">Ningún insumo con stock bajo ✓</span></div>`;
    if(ST.statFilter==='agotado') return `<div class="empty"><i class="ti ti-check"></i><span style="color:#4CAF7D">Todo el stock en uso tiene reposición ✓</span></div>`;
    return `<div class="empty"><i class="ti ti-flask-off"></i><span>Sin insumos en laboratorio</span></div>`;
  }
  let h=`<div class="card"><div class="card-body">`;
  filtered.forEach(item=>{
    const eu=item.usoItems?.length||0;
    const stockLab=item.lab;
    const labAgotado=stockLab===0;
    // Badge de stock
    let stockBadge='';
    if(ST.statFilter==='bajo'){
      const total=item.almacen+item.lab;
      stockBadge=`<div style="text-align:right"><span class="badge b-low" style="display:inline-flex;margin-bottom:2px">Total: ${total} / mín. ${item.min}</span><br><span style="font-size:10px;color:#7A9BB5">Almacén: ${item.almacen} · Lab: ${item.lab}</span></div>`;
    } else {
      // Vista normal: stock en lab + badge de uso si hay
      stockBadge=`<div style="text-align:right;min-width:60px">
        ${labAgotado
          ? `<span class="badge b-zero" style="display:inline-flex">Stock: 0</span>`
          : `<span class="badge b-stock" style="display:inline-flex">Stock: ${stockLab}</span>`}
        ${eu>0?`<br><span class="badge b-uso" style="display:inline-flex;margin-top:3px">En uso: ${eu}</span>`:''}
      </div>`;
    }
    h+=`<div class="row row-clickable" onclick="window.openItemDetail('${item.id}')">
      <div style="flex:1;min-width:0">
        <div class="item-name">${txt(item.name)}</div>
        <div class="item-sub">${txt(item.cat)} · ${item.unit} · ${item.almacen>0?`<span style="color:#7A9BB5">Almacén: <b style="color:#E8F4F2">${item.almacen}</b></span>`:`<span style="color:#E8484A;font-size:10px">Sin almacén</span>`}</div>
      </div>
      ${stockBadge}
      <div style="display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap" onclick="event.stopPropagation()">
        <button class="btn btn-green btn-sm" onclick="window.openM('ingreso','${item.id}','lab')"><i class="ti ti-plus"></i> Ingreso</button>
        ${!labAgotado?`<button class="btn btn-warn btn-sm" onclick="window.openM('usar','${item.id}')"><i class="ti ti-player-play"></i> Usar</button>`:''}
        ${!labAgotado?`<button class="btn btn-danger btn-sm" onclick="window.openM('salida','${item.id}','lab')"><i class="ti ti-door-exit"></i></button>`:''}
        <button class="btn btn-sm" style="background:#FFB347;color:#1a0800" onclick="window.openM('labToPaila','${item.id}')" title="Pasar a La Paila"><i class="ti ti-arrow-right"></i> Paila</button>
        <button class="btn btn-purple btn-sm" onclick="window.quickPedir('${item.id}')"${item._pedidoPendiente?' style="opacity:.5"':''}><i class="ti ti-shopping-cart"></i></button>
      </div>
    </div>`;
  });
  return h+`</div></div>`;
}

    <div class="stat" style="border-color:rgba(255,179,71,.3)"><div class="stat-val" style="color:#F5A623">${items.reduce((a,i)=>a+(i.pailaUsoItems?.length||0),0)}</div><div class="stat-lbl">En uso</div></div>
    <div class="stat clickable ${ST.statFilter==='bajo'?'active-filter':''}" onclick="window._setStatFilter('bajo')"><div class="stat-val" style="color:${nBajos?'#F5A623':'#00C9B1'}">${nBajos}</div><div class="stat-lbl">Stock bajo ${nBajos?'(ver)':''}</div></div>
    <div class="stat clickable ${ST.statFilter==='agotado'?'active-filter':''}" onclick="window._setStatFilter('agotado')"><div class="stat-val" style="color:${nAgot?'#E8484A':'#00C9B1'}">${nAgot}</div><div class="stat-lbl">Paila agotada+uso ${nAgot?'(ver)':''}</div></div>
  </div>
  ${ST.statFilter==='bajo'?`<div class="info-box" style="margin-bottom:8px;border-color:rgba(255,179,71,.4);color:#FFB347"><b>Stock total bajo (almacén + La Paila)</b> · <button onclick="window._setStatFilter('')" style="background:none;border:none;color:#FFB347;cursor:pointer;font-size:12px">✕ Quitar filtro</button></div>`:''}
  ${ST.statFilter==='agotado'?`<div class="info-box" style="margin-bottom:8px;border-color:rgba(255,179,71,.4);color:#FFB347"><b>Sin stock en Paila pero con insumos en uso</b> · <button onclick="window._setStatFilter('')" style="background:none;border:none;color:#FFB347;cursor:pointer;font-size:12px">✕ Quitar filtro</button></div>`:''}
  ${searchBarHTML('Buscar en La Paila...')}${filterBarHTML()}
  <div id="itemList">${listPaila()}</div>`;

function listPaila(){
  let source;
  if(ST.statFilter==='bajo'){
    source=items.filter(i=>(i.almacen+(i.paila||0))>0&&(i.almacen+(i.paila||0))<=i.min);
  } else if(ST.statFilter==='agotado'){
    source=items.filter(i=>!(i.paila||0)&&(i.pailaUsoItems?.length||0)>0);
  } else {
    source=items.filter(i=>(i.paila||0)>0||(i.pailaUsoItems?.length||0)>0||ST.searchQ||ST.catFilter);
  }
  const filtered=applyFilters(source);
  if(!filtered.length){
    if(ST.statFilter==='bajo') return `<div class="empty"><i class="ti ti-check"></i><span style="color:#4CAF7D">Ningún insumo con stock bajo ✓</span></div>`;
    if(ST.statFilter==='agotado') return `<div class="empty"><i class="ti ti-check"></i><span style="color:#4CAF7D">Todo en orden ✓</span></div>`;
    return `<div class="empty"><i class="ti ti-circle"></i><span style="color:#7A9BB5">Sin insumos en La Paila aún</span></div>`;
  }
  let h=`<div class="card"><div class="card-body">`;
  filtered.forEach(item=>{
    const eu=item.pailaUsoItems?.length||0;
    const stockP=item.paila||0;
    const stockLab=item.lab||0;
    const pailaAgotada=stockP===0;
    const camino=enCamino.filter(e=>e.itemId===item.id);
    const qtyCamino=camino.reduce((a,e)=>a+e.qty,0);
    let stockBadge='';
    if(ST.statFilter==='bajo'){
      const total=item.almacen+(item.paila||0);
      stockBadge=`<div style="text-align:right"><span class="badge b-low" style="display:inline-flex;margin-bottom:2px">Total: ${total} / mín. ${item.min}</span><br><span style="font-size:10px;color:#7A9BB5">Almacén: ${item.almacen} · Paila: ${stockP} · Lab: ${stockLab}</span></div>`;
    } else {
      stockBadge=`<div style="text-align:right;min-width:60px">
        ${pailaAgotada
          ? `<span class="badge b-zero" style="display:inline-flex">Paila: 0</span>`
          : `<span class="badge b-paila" style="display:inline-flex">Paila: ${stockP}</span>`}
        ${eu>0?`<br><span class="badge b-uso" style="display:inline-flex;margin-top:3px">En uso: ${eu}</span>`:''}
        ${qtyCamino>0?`<br><span style="display:inline-flex;margin-top:3px;padding:2px 6px;border-radius:20px;font-size:10px;background:rgba(255,179,71,.15);color:#FFB347"><i class="ti ti-truck" style="font-size:9px;margin-right:3px"></i>${qtyCamino} en camino</span>`:''}
      </div>`;
    }
    h+=`<div class="row row-clickable" onclick="window.openItemDetail('${item.id}')">
      <div style="flex:1;min-width:0">
        <div class="item-name">${txt(item.name)}</div>
        <div class="item-sub">${txt(item.cat)} · ${item.unit} · ${stockLab>0?`<span style="color:#7A9BB5">Lab: <b style="color:#00C9B1">${stockLab}</b></span>`:`<span style="color:#5B9BD5;font-size:10px">Sin stock en lab</span>`}</div>
      </div>
      ${stockBadge}
      <div style="display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap" onclick="event.stopPropagation()">
        <button class="btn btn-green btn-sm" onclick="window.openM('ingreso','${item.id}','paila')"><i class="ti ti-plus"></i> Ingreso</button>
        ${stockLab>0?`<button class="btn btn-accent btn-sm" onclick="window.openM('labToPaila','${item.id}')" title="Pasar del Lab a La Paila"><i class="ti ti-arrow-right"></i> Del Lab</button>`:''}
        ${!pailaAgotada?`<button class="btn btn-warn btn-sm" onclick="window.openM('usarPaila','${item.id}')"><i class="ti ti-player-play"></i> Usar</button>`:''}
        ${!pailaAgotada?`<button class="btn btn-danger btn-sm" onclick="window.openM('salida','${item.id}','paila')"><i class="ti ti-door-exit"></i></button>`:''}
        <button class="btn btn-purple btn-sm" onclick="window.quickPedir('${item.id}')"${item._pedidoPendiente?' style="opacity:.5"':''}><i class="ti ti-shopping-cart"></i></button>
      </div>
    </div>`;
  });
  return h+`</div></div>`;
}

// ── EN USO ────────────────────────────────────────────────────────────────────
function renderUso(){
  return `${searchBarHTML('Buscar en uso...')}${filterBarHTML()}<div id="itemList">${listUso()}</div>`;
}
function listUso(){
  const enUsoLab=applyFilters(items.filter(i=>i.usoItems?.length>0));
  const enUsoPaila=applyFilters(items.filter(i=>i.pailaUsoItems?.length>0));
  if(!enUsoLab.length&&!enUsoPaila.length){
    return `<div class="empty"><i class="ti ti-activity"></i><span>Ningún insumo en uso${ST.searchQ||ST.catFilter?' que coincida':''}</span></div>`;
  }
  let h='';
  // ── Sección Laboratorio ──
  if(enUsoLab.length){
    h+=`<div class="sec-title" style="color:#00C9B1">Laboratorio</div><div class="card"><div class="card-body">`;
    enUsoLab.forEach(item=>{
      const stockInfo=item.lab>0
        ?`<span style="color:#00C9B1">Stock lab: ${item.lab}</span>`
        :`<span style="color:#E8484A">Stock lab: 0</span>`;
      const almInfo=item.almacen>0?` · <span style="color:#7A9BB5">Almacén: ${item.almacen}</span>`:'';
      item.usoItems.forEach((u,idx)=>{
        h+=`<div class="row">
          <div style="flex:1;min-width:0">
            <div class="item-name">${txt(item.name)} <span style="font-size:10px;color:#7A9BB5">#${idx+1}</span></div>
            <div class="item-sub">Desde: ${u.since||''}</div>
            ${idx===0?`<div style="font-size:10px;margin-top:2px">${stockInfo}${almInfo}</div>`:''}
          </div>
          <span class="badge b-uso">En uso</span>
          <button class="btn btn-ghost btn-sm" onclick="window.retirarUso('${item.id}','${u.id}')"><i class="ti ti-square-check"></i> Retirar</button>
        </div>`;
      });
    });
    h+=`</div></div>`;
  }
  // ── Sección La Paila ──
  if(enUsoPaila.length){
    h+=`<div class="sec-title" style="color:#FFB347;margin-top:${enUsoLab.length?'10px':'0'}">La Paila</div><div class="card" style="border-color:rgba(255,179,71,.25)"><div class="card-body">`;
    enUsoPaila.forEach(item=>{
      const stockInfo=(item.paila||0)>0
        ?`<span style="color:#FFB347">Stock Paila: ${item.paila}</span>`
        :`<span style="color:#E8484A">Stock Paila: 0</span>`;
      item.pailaUsoItems.forEach((u,idx)=>{
        h+=`<div class="row">
          <div style="flex:1;min-width:0">
            <div class="item-name">${txt(item.name)} <span style="font-size:10px;color:#7A9BB5">#${idx+1}</span></div>
            <div class="item-sub">Desde: ${u.since||''}</div>
            ${idx===0?`<div style="font-size:10px;margin-top:2px">${stockInfo}</div>`:''}
          </div>
          <span style="display:inline-flex;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(255,179,71,.15);color:#FFB347">En uso</span>
          <button class="btn btn-ghost btn-sm" onclick="window.retirarUsoPaila('${item.id}','${u.id}')"><i class="ti ti-square-check"></i> Retirar</button>
        </div>`;
      });
    });
    h+=`</div></div>`;
  }
  return h;
}

// ── MOVIMIENTOS ───────────────────────────────────────────────────────────────
function renderLog(){
  const ICONS={transfer:'→',uso:'▶',salida:'↑',retiro:'■',nuevo:'+',edit:'✎',delete:'✕',ingreso:'↓',pedido:'🛒'};
  const COLORS={transfer:'#00C9B1',uso:'#F5A623',salida:'#E8484A',retiro:'#7A9BB5',nuevo:'#00C9B1',edit:'#7A9BB5',delete:'#E8484A',ingreso:'#4CAF7D',pedido:'#A78BFA'};
  const BGS={transfer:'rgba(0,201,177,.12)',uso:'rgba(245,166,35,.12)',salida:'rgba(232,72,74,.12)',retiro:'rgba(122,155,181,.1)',nuevo:'rgba(0,201,177,.12)',edit:'rgba(122,155,181,.1)',delete:'rgba(232,72,74,.12)',ingreso:'rgba(76,175,125,.12)',pedido:'rgba(167,139,250,.1)'};
  const consumo={};
  logs.forEach(e=>{
    if(e.type==='salida'||e.type==='uso'){
      let m=''; try{const p=e.time.split(', ')[0].split('/');if(p.length===3)m=`${p[2]}-${p[1].padStart(2,'0')}`;}catch{}
      if(!m) return;
      const name=(e.text.match(/^(?:Salida|En uso): (.+)$/)||[])[1]||e.text;
      const qty=parseInt((e.detail||'').match(/^(\d+)/)?.[1]||'1');
      if(!consumo[m])consumo[m]={};
      consumo[m][name]=(consumo[m][name]||0)+qty;
    }
  });
  const meses=Object.keys(consumo).sort().reverse().slice(0,6);
  let statsH='';
  if(meses.length){
    statsH=`<div class="sec-title">Estadística de consumo mensual</div>`;
    meses.forEach(m=>{
      const entries=Object.entries(consumo[m]).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const max=entries[0]?.[1]||1;
      statsH+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:#00C9B1;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid #2E4560">${mkLabel(m)}</div>`;
      entries.forEach(([n,q])=>{ statsH+=`<div class="chart-bar-wrap"><div class="chart-bar-label"><span>${txt(n)}</span><span style="color:#00C9B1">${q}</span></div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(q/max*100)}%"></div></div></div>`; });
      statsH+=`</div>`;
    });
  }
  const adminCtrl=ST.adminUnlocked
    ?`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap" class="no-print">
        <button class="btn btn-danger btn-sm" onclick="window.openM('borrarDesde')"><i class="ti ti-calendar-minus"></i> Borrar desde fecha</button>
        <button class="btn btn-danger btn-sm" onclick="window.openM('borrarTodos')"><i class="ti ti-trash"></i> Borrar todos</button>
      </div>`
    :`<div style="margin-bottom:10px" class="no-print"><button class="btn btn-ghost btn-sm" onclick="window.requireAdmin(()=>{ST.adminUnlocked=true;render();})"><i class="ti ti-lock"></i> Gestionar movimientos</button></div>`;

  return `${statsH}<div class="sec-title" style="margin-top:${meses.length?'8px':'2px'}">Registro de movimientos</div>${adminCtrl}
  ${searchBarHTML('Buscar en movimientos...')}<div id="itemList">${listLog()}</div>`;
}
function listLog(){
  const ICONS={transfer:'→',uso:'▶',salida:'↑',retiro:'■',nuevo:'+',edit:'✎',delete:'✕',ingreso:'↓',pedido:'🛒'};
  const COLORS={transfer:'#00C9B1',uso:'#F5A623',salida:'#E8484A',retiro:'#7A9BB5',nuevo:'#00C9B1',edit:'#7A9BB5',delete:'#E8484A',ingreso:'#4CAF7D',pedido:'#A78BFA'};
  const BGS={transfer:'rgba(0,201,177,.12)',uso:'rgba(245,166,35,.12)',salida:'rgba(232,72,74,.12)',retiro:'rgba(122,155,181,.1)',nuevo:'rgba(0,201,177,.12)',edit:'rgba(122,155,181,.1)',delete:'rgba(232,72,74,.12)',ingreso:'rgba(76,175,125,.12)',pedido:'rgba(167,139,250,.1)'};
  const q=ST.searchQ.toLowerCase();
  const vis=q?logs.filter(e=>e.text?.toLowerCase().includes(q)||e.detail?.toLowerCase().includes(q)):logs;
  if(!vis.length) return `<div class="empty"><i class="ti ti-history"></i><span>Sin movimientos${q?' que coincidan':''}</span></div>`;
  let h=`<div class="card"><div class="card-body">`;
  vis.forEach(e=>{
    const delBtn=ST.adminUnlocked?`<button class="btn btn-ghost btn-sm no-print" onclick="window.borrarLog('${e.id}')" title="Eliminar"><i class="ti ti-trash" style="color:#E8484A"></i></button>`:'';
    h+=`<div class="log-entry">
      <div class="log-icon" style="background:${BGS[e.type]||'rgba(122,155,181,.1)'}"><span style="color:${COLORS[e.type]||'#7A9BB5'}">${ICONS[e.type]||'·'}</span></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:#E8F4F2">${txt(e.text)}</div>
        ${e.detail?`<div style="font-size:11px;color:#7A9BB5;margin-top:1px">${txt(e.detail)}</div>`:''}
        <div style="font-size:10px;color:#7A9BB5;margin-top:1px">${e.time||''}</div>
      </div>${delBtn}
    </div>`;
  });
  return h+`</div></div>`;
}

// ── PEDIDOS ───────────────────────────────────────────────────────────────────
function renderPedidos(){
  if(!ST.pedidosUnlocked) return `<div class="lock-screen">
    <i class="ti ti-shopping-cart" style="color:#A78BFA"></i>
    <h2 style="color:#E8F4F2">Sección de Pedidos</h2>
    <p style="color:#7A9BB5;font-size:13px;text-align:center">Contraseña requerida</p>
    <input class="pin-input" id="pinInput" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')window.checkPass()">
    <button class="btn btn-purple" onclick="window.checkPass()"><i class="ti ti-lock-open"></i> Entrar</button>
    <span id="pinError" style="color:#E8484A;font-size:12px;display:none">Contraseña incorrecta</span>
  </div>`;

  const hoy=new Date(), mkA=mk(hoy), mkP=mk(new Date(hoy.getFullYear(),hoy.getMonth()-1,1));
  const cRef={};
  logs.forEach(e=>{
    if(e.type==='salida'||e.type==='uso'){
      let m=''; try{const p=e.time.split(', ')[0].split('/');if(p.length===3)m=`${p[2]}-${p[1].padStart(2,'0')}`;}catch{}
      if(m!==mkA&&m!==mkP) return;
      const name=(e.text.match(/^(?:Salida|En uso): (.+)$/)||[])[1]||e.text;
      const qty=parseInt((e.detail||'').match(/^(\d+)/)?.[1]||'1');
      if(!cRef[name])cRef[name]={a:0,p:0};
      if(m===mkA)cRef[name].a+=qty; else cRef[name].p+=qty;
    }
  });

  const listaPedido=items.filter(i=>i._pedidoPendiente);
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="sec-title" style="margin:0">Lista para pedir (${listaPedido.length})</div>
    ${listaPedido.length?`<button class="btn btn-purple btn-sm" onclick="window.openM('confirmarPedido')"><i class="ti ti-check"></i> Hacer pedido</button>`:''}
  </div>`;

  if(!listaPedido.length){
    h+=`<div class="empty" style="padding:16px"><i class="ti ti-shopping-cart"></i><span style="font-size:12px">Agrega insumos desde Total o Laboratorio con <i class="ti ti-shopping-cart"></i></span></div>`;
  } else {
    h+=`<div class="card"><div class="card-body">`;
    listaPedido.forEach(item=>{
      const r=cRef[item.name]||{};
      h+=`<div class="row">
        <div style="flex:1;min-width:0">
          <div class="item-name">${txt(item.name)}</div>
          <div class="item-sub">${r.p?`Mes pasado: <span style="color:#00C9B1">${r.p}</span> ·`:''} ${r.a?`Este mes: <span style="color:#F5A623">${r.a}</span>`:''}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="window.quitarDeLista('${item.id}')"><i class="ti ti-x"></i></button>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // Buscador para agregar cualquier insumo a la lista
  h+=`<div class="section-divider"></div>
  <div class="sec-title">Agregar insumo a la lista</div>
  <div class="search-wrap"><input class="search" id="pedidoSearch" placeholder="Buscar insumo para agregar..." autocomplete="off" oninput="window.filtrarPedidoBusq(this.value)"></div>
  <div id="pedidoBusqResults"></div>`;

  h+=`<div class="section-divider"></div><div class="sec-title">Pedidos realizados</div>`;
  if(!pedidos.length) h+=`<div class="empty"><i class="ti ti-package"></i><span>No hay pedidos aún</span></div>`;
  else pedidos.forEach(p=>{
    const tot=p.items?.length||0, aud=p.items?.filter(i=>i.auditado).length||0;
    const completo=tot>0&&aud===tot;
    h+=`<div class="pedido-card" onclick="window.openM('auditPedido','${p.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
        <div style="font-weight:600;color:#E8F4F2;font-size:13px"><i class="ti ti-package" style="margin-right:4px;color:#A78BFA"></i>${txt(p.fecha||'Sin fecha')}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;padding:2px 7px;border-radius:20px;${completo?'background:rgba(76,175,125,.15);color:#4CAF7D':'background:rgba(245,166,35,.15);color:#F5A623'}">${completo?'Auditado':'Pendiente'}</span>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.imprimirPedido('${p.id}')"><i class="ti ti-printer"></i> Imprimir</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.doDeletePedido('${p.id}')" title="Eliminar pedido"><i class="ti ti-trash" style="color:#E8484A"></i></button>
        </div>
      </div>
      <div style="font-size:11px;color:#7A9BB5">${tot} ítems · ${aud}/${tot} auditados</div>
    </div>`;
  });

  h+=`<div style="margin-top:12px;padding-top:10px;border-top:1px solid #2E4560;display:flex;justify-content:flex-end">
    <button class="btn btn-ghost btn-sm" onclick="ST.pedidosUnlocked=false;ST.adminUnlocked=false;render()"><i class="ti ti-logout"></i> Bloquear</button>
  </div>`;
  return h;
}

window.filtrarPedidoBusq = (q) => {
  const r=$('pedidoBusqResults'); if(!r) return;
  if(!q.trim()){r.innerHTML='';return;}
  const found=items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!found.length){r.innerHTML=`<div style="color:#7A9BB5;font-size:12px;padding:6px 0">Sin resultados</div>`;return;}
  let h=`<div class="card"><div class="card-body">`;
  found.forEach(item=>{
    h+=`<div class="row">
      <div style="flex:1;min-width:0"><div class="item-name">${txt(item.name)}</div><div class="item-sub">${txt(item.cat)}</div></div>
      <button class="btn btn-purple btn-sm" onclick="window.agregarALista('${item.id}')"${item._pedidoPendiente?' style="opacity:.5" disabled':''}><i class="ti ti-plus"></i> ${item._pedidoPendiente?'Ya agregado':'Agregar'}</button>
    </div>`;
  });
  r.innerHTML=h+`</div></div>`;
};

window.agregarALista=async(id)=>{
  await updateDoc(doc(db,'items',id),{_pedidoPendiente:true});

};

    <div style="display:flex;gap:6px">
      ${papelera.length?`<button class="btn btn-danger btn-sm" onclick="window.openM('vaciarPapelera')"><i class="ti ti-trash"></i> Vaciar</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="ST.adminUnlocked=false;render()"><i class="ti ti-logout"></i> Bloquear</button>
    </div>
  </div>`;
  if(!papelera.length) return h+`<div class="empty"><i class="ti ti-trash"></i><span>Papelera vacía</span></div>`;
  h+=`<div class="card"><div class="card-body">`;
  papelera.forEach(e=>{
    h+=`<div class="log-entry">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:#E8F4F2">${txt(e.text||'')}</div>
        ${e.detail?`<div style="font-size:11px;color:#7A9BB5">${txt(e.detail)}</div>`:''}
        <div style="font-size:10px;color:#7A9BB5">Original: ${e.time||''} · Eliminado: ${e.deletedTime||''}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="window.restaurarLog('${e.id}')" title="Restaurar"><i class="ti ti-restore"></i></button>
    </div>`;
  });
  return h+`</div></div>`;
}

function requireAdmin(cb){
  if(ST.adminUnlocked){cb();return;}
  const area=$('modal-area');
  area.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">
    <h3><i class="ti ti-lock" style="color:#E8484A"></i>Acceso de administrador</h3>
    <div class="field"><label>Contraseña</label><input id="adminPin" type="password" autofocus onkeydown="if(event.key==='Enter')window._adminCb()"></div>
    <span id="adminPinErr" style="color:#E8484A;font-size:12px;display:none">Contraseña incorrecta</span>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-danger" onclick="window._adminCb()"><i class="ti ti-lock-open"></i> Entrar</button></div>
  </div></div>`;
  window._adminCb=()=>{
    const v=$('adminPin')?.value||'';
    if(v===cfg.password){ST.adminUnlocked=true;closeM();cb();}
    else{const e=$('adminPinErr');if(e){e.style.display='block';setTimeout(()=>e.style.display='none',1500);}}
  };
}
window.requireAdmin=requireAdmin;
window.checkPass=()=>{

  else{const e=$('pinError');if(e){e.style.display='block';setTimeout(()=>e.style.display='none',1500);}}
};
window.checkAdminPap=()=>{
  const v=$('pinInputPap')?.value||'';
  if(v===cfg.password){ST.adminUnlocked=true;render();}
  else{const e=$('pinErrorPap');if(e){e.style.display='block';setTimeout(()=>e.style.display='none',1500);}}
};

          <button class="btn btn-warn btn-sm" style="background:#FFB347;color:#1a0800" onclick="window.doReemplazarUsoPaila('${item.id}','${u.id}')"><i class="ti ti-refresh"></i> Reemplazar</button></div>`).join('')}

  } else if(type==='remManualTipo'){
    if(!manualRem) manualRem={tipo:'',destinoLibre:'',items:[]};

          <option value="prestamo">Préstamo</option>

      if((it.paila||0)>0) opts.push(`<option value="paila">Restar de La Paila (disp: ${it.paila})</option>`);

  } else if(type==='delete'){
    if(!item) return;

      <h3><i class="ti ti-trash" style="color:#E8484A"></i>Eliminar insumo</h3>
      <div class="warn-box">¿Eliminar <b style="color:#E8F4F2">${txt(item.name)}</b>? Esta acción no se puede deshacer.</div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-danger" onclick="window.doDelete('${item.id}','${txt(item.name)}')"><i class="ti ti-trash"></i> Eliminar</button></div>

  } else if(type==='borrarDesde'){

    area.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">

  } else if(type==='vaciarPapelera'){

  } else if(type==='confirmarPedido'){
    const lista=items.filter(i=>i._pedidoPendiente);
    if(!lista.length) return;
    const hoy=new Date(), mkA=mk(hoy), mkP=mk(new Date(hoy.getFullYear(),hoy.getMonth()-1,1));
    const cRef2={};
    logs.forEach(e=>{
      if(e.type==='salida'||e.type==='uso'){
        let m=''; try{const p=e.time.split(', ')[0].split('/');if(p.length===3)m=`${p[2]}-${p[1].padStart(2,'0')}`;}catch{}
        if(m!==mkA&&m!==mkP) return;

    }
    if(recibidos.length){
      rows+=`<div class="sec-title" style="margin-top:10px;color:#4CAF7D">Recibidos ✓</div>`;
      recibidos.forEach(pi=>{ rows+=`<div class="row"><div style="flex:1;min-width:0"><div class="item-name">${txt(pi.name)}</div><div class="item-sub">${pi.qty} ${txt(pi.unit)} · ${pi.auditadoEn||''}</div></div><span class="badge b-total">Llegó</span></div>`; });
    }
    if(noRecib.length){
      rows+=`<div class="sec-title" style="margin-top:10px;color:#E8484A">No recibidos ✗ (puedes actualizarlos)</div>`;
      noRecib.forEach(pi=>{ const ri=p.items.indexOf(pi); rows+=`<div class="row"><div style="flex:1;min-width:0"><div class="item-name">${txt(pi.name)}</div><div class="item-sub">${pi.qty} ${txt(pi.unit)} · Marcado el: ${pi.auditadoEn||''}</div></div><button class="btn btn-green btn-sm" onclick="window.auditarItem('${p.id}',${ri},true)"><i class="ti ti-check"></i> Llegó</button></div>`; });
    }
    if(!rows) rows=`<div class="empty"><span>Sin ítems en este pedido</span></div>`;
    area.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">
      <h3><i class="ti ti-package" style="color:#A78BFA"></i>${txt(p.fecha||'Pedido')}</h3>
      <div>${rows}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="window.imprimirPedido('${p.id}')"><i class="ti ti-printer"></i> Imprimir</button>
        <button class="btn btn-ghost" onclick="closeM()">Cerrar</button>
      </div>
    </div></div>`;

  } else if(type==='agregarStockPedido'){
    const pedidoId=args[0], idx=args[1], qtyReal=args[2];
    const p=pedidos.find(x=>x.id===pedidoId); if(!p) return;
    const pi=p.items[idx];

    area.innerHTML=`<div class="modal-bg"><div class="modal">

      <div class="info-box"><b style="color:#E8F4F2">${txt(pi.name)}</b> llegó. ¿Deseas agregar <b>${qtyMostrar} ${txt(pi.unit)}</b> al stock?${faltante>0?`<br><span style="color:#F5A623;font-size:11px"><i class="ti ti-alert-triangle"></i> Faltan ${faltante} ${txt(pi.unit)} — quedaron pendientes en el pedido.</span>`:''}</div>

  updateDoc(doc(db,'items',item.id),{usoItems:[...(item.usoItems||[]),{id:uid,name:item.name,since:ts()}],lab:item.lab-1})

window.quickPedir=async(id)=>{

  if(item._pedidoPendiente){ if(!confirm(`"${item.name}" ya está en la lista de pedido. ¿Deseas quitarlo?`)) return; await updateDoc(doc(db,'items',id),{_pedidoPendiente:false}); return; }
  if(confirm(`¿Agregar "${item.name}" a la lista de pedido?`)) await updateDoc(doc(db,'items',id),{_pedidoPendiente:true});
};
window.quitarDeLista=async(id)=>{ await updateDoc(doc(db,'items',id),{_pedidoPendiente:false}); };
window.doHacerPedido=async(len)=>{
  const lista=items.filter(i=>i._pedidoPendiente);
  const pedidoItems=lista.map((item,i)=>({itemId:item.id,name:item.name,qty:parseInt(document.getElementById(`pqty_${i}`)?.value)||1,unit:item.unit,auditado:false,llegó:null,auditadoEn:null}));
  await addDoc(collection(db,'pedidos'),{fecha:tsDate(),items:pedidoItems,createdAt:serverTimestamp(),estado:'pendiente'});
  await addLog('pedido',`Pedido realizado`,`${pedidoItems.length} ítems · ${tsDate()}`);
  const batch=writeBatch(db);
  lista.forEach(item=>batch.update(doc(db,'items',item.id),{_pedidoPendiente:false}));
  await batch.commit();
  closeM();
};
window.auditarItem=async(pedidoId,idx,llego,qtyRecibida)=>{
  const p=pedidos.find(x=>x.id===pedidoId); if(!p) return;
  const its=[...p.items];
  const original=its[idx];
  const qtyPedida=original.qty;
  const qtyReal=llego?(qtyRecibida||qtyPedida):0;
  const qtyFaltante=llego?Math.max(0,qtyPedida-qtyReal):0;

  if(llego && qtyFaltante>0){
    // Llegó parcialmente: marcar recibido con la cantidad real + agregar nuevo ítem pendiente con lo faltante
    its[idx]={...original,auditado:true,llegó:true,qty:qtyReal,auditadoEn:ts()};
    its.push({...original,auditado:false,qty:qtyFaltante,_parcial:true});
  } else {
    its[idx]={...original,auditado:true,llegó:llego,qty:llego?qtyReal:qtyPedida,auditadoEn:ts()};
  }
  await updateDoc(doc(db,'pedidos',pedidoId),{items:its});
  if(llego) window.openM('agregarStockPedido',pedidoId,idx,qtyReal);
  else window.openM('auditPedido',pedidoId);
};
window.agregarStockPedido=async(pedidoId,idx,destino,qtyReal)=>{
  const p=pedidos.find(x=>x.id===pedidoId); if(!p) return;
  const pi=p.items[idx]; if(!pi) return;
  const qty=qtyReal||pi.qty;
  const itm=items.find(i=>i.id===pi.itemId);
  if(itm&&destino!=='no'){
    const upd=destino==='almacen'?{almacen:itm.almacen+qty}:{lab:itm.lab+qty};
    await updateDoc(doc(db,'items',pi.itemId),upd);
    await addLog('ingreso',`Ingreso desde pedido: ${pi.name}`,`${qty} ${pi.unit} → ${destino==='almacen'?'almacén':'laboratorio'}`);
  }
  closeM(); window.openM('auditPedido',pedidoId);
};

window.imprimirPedido=(id)=>{
  const p=pedidos.find(x=>x.id===id); if(!p) return;
  const rows=p.items.map(pi=>`<tr><td style="padding:6px 10px;border:1px solid #ccc">${pi.name}</td><td style="padding:6px 10px;border:1px solid #ccc;text-align:center">${pi.qty} ${pi.unit}</td><td style="padding:6px 10px;border:1px solid #ccc;text-align:center">${pi.auditado?(pi.llegó?'✓ Llegó':'✗ No llegó'):'Pendiente'}</td></tr>`).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>Pedido ${p.fecha}</title><style>body{font-family:system-ui,sans-serif;padding:24px;color:#000}h1{font-size:18px;margin-bottom:4px}p{font-size:13px;color:#555;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#f0f0f0;padding:6px 10px;border:1px solid #ccc;text-align:left}</style></head><body>
    <div style="text-align:center;margin-bottom:14px"><img src="${LOGO_HDSR}" alt="HDSR" style="height:60px;width:auto"></div>
    <h1>Pedido de Insumos · Laboratorio HDSR</h1><p>Fecha: ${p.fecha} &nbsp;·&nbsp; Total: ${p.items.length} ítems</p>
    <table><thead><tr><th>Insumo</th><th>Cantidad</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table>
    <p style="margin-top:20px;font-size:11px;color:#888">Generado: ${ts()}</p>
    <scr'+'ipt>window.onload=()=>window.print();<\/script></body></html>`);
  win.document.close();
};

window.doAdd=async()=>{
  const name=$('m-name')?.value.trim(); if(!name){alert('Escribe el nombre del insumo');return;}
  await addDoc(collection(db,'items'),{name,cat:$('m-cat').value,unit:$('m-unit').value,almacen:parseInt($('m-qty').value)||0,lab:0,usoItems:[],min:parseInt($('m-min').value)||2,_pedidoPendiente:false});
  await addLog('nuevo',`Insumo creado: ${name}`,`Almacén inicial: ${parseInt($('m-qty').value)||0} ${$('m-unit').value}`);
  closeM();
};
window.doEdit=async(id,prevA,prevL)=>{
  const name=$('m-name')?.value.trim(); if(!name) return;
  await updateDoc(doc(db,'items',id),{name,cat:$('m-cat').value,unit:$('m-unit').value,almacen:parseInt($('m-almacen').value)||0,lab:parseInt($('m-lab').value)||0,paila:parseInt($('m-paila').value)||0,min:parseInt($('m-min').value)||2});
  await addLog('edit',`Editado: ${name}`,`Almacén: ${prevA}→${parseInt($('m-almacen').value)||0}, Laboratorio: ${prevL}→${parseInt($('m-lab').value)||0}`);
  closeM();
};
window.doIngreso=async(id,from,prevA,prevL,unit,name,prevP=0)=>{
  const qty=parseInt($('m-qty')?.value)||0; if(qty<=0){alert('Cantidad inválida');return;}
  const origen=$('m-origen')?.value||'comercial';
  if(from==='lab'&&origen==='almacen'){
    if(prevA<qty){alert(`Solo hay ${prevA} ${unit} en almacén`);return;}
    await updateDoc(doc(db,'items',id),{almacen:prevA-qty,lab:prevL+qty});
    await addLog('ingreso',`Ingreso al laboratorio desde almacén: ${name}`,`${qty} ${unit}`);
  } else if(from==='lab'&&origen==='farmacia'){
    await updateDoc(doc(db,'items',id),{lab:prevL+qty});
    await addLog('ingreso',`Ingreso al laboratorio desde farmacia: ${name}`,`+${qty} ${unit}`);
  } else if(from==='lab'){
    await updateDoc(doc(db,'items',id),{lab:prevL+qty});
    await addLog('ingreso',`Ingreso al laboratorio (casa comercial): ${name}`,`+${qty} ${unit}`);
  } else if(from==='paila'&&origen==='almacen'){
    if(prevA<qty){alert(`Solo hay ${prevA} ${unit} en almacén`);return;}
    await updateDoc(doc(db,'items',id),{almacen:prevA-qty,paila:prevP+qty});
    await addLog('ingreso',`Ingreso a La Paila desde almacén: ${name}`,`${qty} ${unit}`);
  } else if(from==='paila'&&origen==='farmacia'){
    await updateDoc(doc(db,'items',id),{paila:prevP+qty});
    await addLog('ingreso',`Ingreso a La Paila desde farmacia: ${name}`,`+${qty} ${unit}`);
  } else if(from==='paila'&&origen==='lab'){
    if(prevL<qty){alert(`Solo hay ${prevL} ${unit} en laboratorio`);return;}
    await updateDoc(doc(db,'items',id),{lab:prevL-qty,paila:prevP+qty});
    await addLog('ingreso',`Ingreso a La Paila desde laboratorio: ${name}`,`${qty} ${unit}`);
  } else if(from==='paila'){
    await updateDoc(doc(db,'items',id),{paila:prevP+qty});
    await addLog('ingreso',`Ingreso a La Paila (casa comercial): ${name}`,`+${qty} ${unit}`);
  } else {
    await updateDoc(doc(db,'items',id),{almacen:prevA+qty});
    await addLog('ingreso',`Ingreso al almacén: ${name}`,`+${qty} ${unit}`);
  }
  closeM();
};
window.doTransfer=async(id,prevA,prevL,unit,name)=>{
  const qty=parseInt($('m-qty')?.value)||0; if(qty<=0||qty>prevA){alert('Cantidad no válida');return;}
  await updateDoc(doc(db,'items',id),{almacen:prevA-qty,lab:prevL+qty});
  await addLog('transfer',`${name}: almacén → laboratorio`,`${qty} ${unit}`); closeM();
};
window.doSalida=async(id,from,almacen,lab,unit,name,paila=0)=>{
  const qty=parseInt($('m-qty')?.value)||0;
  const selDest=$('m-dest')?.value, destOtro=$('m-dest-otro')?.value.trim();
  const dest=selDest==='__otro'?destOtro||'Otro servicio':selDest||'Servicio externo';
  if(!dest||dest==='Seleccionar servicio...'){alert('Selecciona un servicio destinatario');return;}
  const avail=from==='almacen'?almacen:from==='paila'?paila:lab;
  if(qty<=0||qty>avail){alert('Cantidad no válida');return;}
  const upd=from==='almacen'?{almacen:almacen-qty}:from==='paila'?{paila:paila-qty}:{lab:lab-qty};
  await updateDoc(doc(db,'items',id),upd);
  const lugar=from==='almacen'?'almacén':from==='paila'?'La Paila':'laboratorio';
  await addLog('salida',`Salida: ${name}`,`${qty} ${unit} → ${dest} (${lugar})`);
  // Guardar en colección de salidas para historial y estadísticas
  await addDoc(collection(db,'salidas'),{
    name,qty,unit,dest,desde:lugar,
    cat:items.find(i=>i.id===id)?.cat||'',
    fecha:tsDate(),hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),
    time:ts(),createdAt:serverTimestamp()
  });
  closeM();
  // Preguntar remisión solo desde laboratorio y si el servicio está configurado
  if(from==='lab' && (cfg.remisionServices||[]).includes(dest)){
    const itm=items.find(i=>i.id===id);
    openM('preguntarRemision',id,{qty,unit,name,dest,cat:itm?.cat||'',from:'lab'});
  }
};

window.doLabToPaila=async(id,prevL,prevP,unit,name)=>{
  const qty=parseInt($('m-qty')?.value)||0;
  if(qty<=0||qty>prevL){alert('Cantidad no válida');return;}
  // Restar del lab inmediatamente, pero NO sumar a paila — queda en tránsito
  await updateDoc(doc(db,'items',id),{lab:prevL-qty});
  await addDoc(collection(db,'enCamino'),{itemId:id,name,qty,unit,desde:ts(),createdAt:serverTimestamp()});
  await addLog('transfer',`${name}: laboratorio → En camino a La Paila`,`${qty} ${unit}`);
  closeM();
  // Preguntar si agrega a remisiones (traslado permanente a La Paila)
  openM('preguntarRemisionPaila',id,{qty,unit,name});
};

window.doRechazarEnCamino=async(enCaminoId)=>{
  if(!confirm('¿Devolver este ítem al stock del laboratorio?')) return;
  const ec=enCamino.find(e=>e.id===enCaminoId); if(!ec) return;
  const it=items.find(i=>i.id===ec.itemId); if(!it) return;
  await updateDoc(doc(db,'items',ec.itemId),{lab:(it.lab||0)+ec.qty});

window.borrarLog=async(id)=>{
  const e=logs.find(l=>l.id===id); if(!e) return;
  await addDoc(collection(db,'papelera'),{...e,deletedAt:serverTimestamp(),deletedTime:ts()});
  await deleteDoc(doc(db,'logs',id));
};
window.doBorrarDesde=async(fechaStr)=>{
  const lim=new Date(fechaStr+'T00:00:00'); if(isNaN(lim)){alert('Fecha inválida');return;}
  const aborrar=logs.filter(e=>{const d=parseTs(e.time);return d&&d>=lim;});
  if(!aborrar.length){alert('No hay movimientos desde esa fecha');return;}
  closeM();
  const batch=writeBatch(db);
  for(const e of aborrar){batch.set(doc(collection(db,'papelera')),{...e,deletedAt:serverTimestamp(),deletedTime:ts()});batch.delete(doc(db,'logs',e.id));}
  await batch.commit();
};
window.doBorrarTodos=async()=>{ closeM(); const batch=writeBatch(db); for(const e of logs){batch.set(doc(collection(db,'papelera')),{...e,deletedAt:serverTimestamp(),deletedTime:ts()});batch.delete(doc(db,'logs',e.id));} await batch.commit(); };
window.restaurarLog=async(pid)=>{ const e=papelera.find(p=>p.id===pid); if(!e) return; const{id:_,deletedAt:_da,deletedTime:_dt,...ld}=e; await addDoc(collection(db,'logs'),{...ld,createdAt:serverTimestamp()}); await deleteDoc(doc(db,'papelera',pid)); };

window.iniciarRemisionManual=()=>{
  manualRem={ tipo:'', destinoLibre:'', items:[] };
  window.openM('remManualTipo');
};

window.cancelarRemManual=()=>{ manualRem=null; closeM(); };

window.remManualSetTipo=(tipo)=>{
  if(!manualRem) return;
  const dest=$('m-rem-destlibre')?.value.trim()||'';
  if(!dest){ alert('Escribe el destino (a quién/dónde va dirigido)'); return; }
  manualRem.tipo=tipo;
  manualRem.destinoLibre=dest;
  window.openM('remManualItems');
};

window.remManualBuscar=(q)=>{
  const box=$('remManualResults'); if(!box) return;
  q=(q||'').trim().toLowerCase();
  if(!q){ box.innerHTML=''; return; }
  const matches=items.filter(i=>(i.name||'').toLowerCase().includes(q)).slice(0,8);
  box.innerHTML=matches.length?matches.map(i=>`
    <div class="row row-clickable" style="padding:7px 8px" onclick="window.remManualSeleccionar('${i.id}')">
      <div style="flex:1;min-width:0"><div class="item-name" style="font-size:12px">${txt(i.name)}</div>
      <div class="item-sub">Almacén: ${i.almacen} · Lab: ${i.lab} · Paila: ${i.paila||0}</div></div>
    </div>`).join('')
    : `<div style="padding:8px;font-size:12px;color:#7A9BB5">Sin coincidencias. Puedes crear un insumo nuevo abajo.</div>`;
};

window.remManualSeleccionar=(itemId)=>{
  const it=items.find(x=>x.id===itemId); if(!it) return;
  window.openM('remManualCantidad',itemId);
};

window.remManualNuevo=()=>{
  window.openM('remManualCantidad','__new__');
};

window.remManualAgregar=(itemId)=>{
  const qty=parseInt($('m-rm-qty')?.value)||0;
  if(qty<=0){alert('Cantidad inválida');return;}
  const fuente=$('m-rm-fuente')?.value||'aparte';
  if(itemId==='__new__'){
    const name=$('m-rm-name')?.value.trim();
    const unit=$('m-rm-unit')?.value||'Unidad';
    const cat=$('m-rm-cat')?.value||'Otro';
    if(!name){alert('Escribe el nombre del insumo');return;}
    manualRem.items.push({name,qty,unit,cat,fuente:'aparte',itemId:null});
  } else {
    const it=items.find(x=>x.id===itemId); if(!it) return;
    if(fuente!=='aparte'){
      const disp=fuente==='almacen'?it.almacen:fuente==='lab'?it.lab:(it.paila||0);
      if(qty>disp){alert(`Solo hay ${disp} ${it.unit} disponibles en ${fuente==='almacen'?'almacén':fuente==='lab'?'laboratorio':'La Paila'}`);return;}
    }
    manualRem.items.push({name:it.name,qty,unit:it.unit,cat:it.cat,fuente,itemId});
  }
  window.openM('remManualItems');
};

window.remManualQuitar=(idx)=>{ manualRem.items.splice(idx,1); window.openM('remManualItems'); };

window.doConfirmarRemManual=async()=>{
  if(!manualRem||!manualRem.items.length){alert('Agrega al menos un insumo');return;}
  // Descontar stock de las fuentes seleccionadas (si no es "aparte")
  for(const ri of manualRem.items){
    if(ri.fuente==='aparte'||!ri.itemId) continue;
    const it=items.find(x=>x.id===ri.itemId); if(!it) continue;
    if(ri.fuente==='almacen') await updateDoc(doc(db,'items',ri.itemId),{almacen:Math.max(0,(it.almacen||0)-ri.qty)});
    else if(ri.fuente==='lab') await updateDoc(doc(db,'items',ri.itemId),{lab:Math.max(0,(it.lab||0)-ri.qty)});
    else if(ri.fuente==='paila') await updateDoc(doc(db,'items',ri.itemId),{paila:Math.max(0,(it.paila||0)-ri.qty)});
  }
  const ahora=new Date();
  await addDoc(collection(db,'remisiones'),{
    fecha:ahora.toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),
    hora:ahora.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),
    items:manualRem.items.map(ri=>({name:ri.name,qty:ri.qty,unit:ri.unit,cat:ri.cat})),
    tipo:manualRem.tipo,
    destino:manualRem.destinoLibre,
    manual:true,
    createdAt:serverTimestamp()
  });
  await addLog('salida',`Remisión manual generada`,`${manualRem.items.length} ítems → ${manualRem.destinoLibre}`);
  manualRem=null;
  closeM();
  if(ST.tab==='remisiones') render();
  setTimeout(()=>{ const nueva=remisiones[0]; if(nueva) generarImpresionRemision(nueva); },800);
};

    <div class="sec-title" style="margin:0;color:#64B5F6">Carrito de remisión actual (${carritoRemision.length})</div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick="window.iniciarRemisionManual()"><i class="ti ti-plus"></i> Crear remisión nueva</button>
      ${carritoRemision.length?`<button class="btn btn-sm" style="background:#64B5F6;color:#0F1923" onclick="window.openM('confirmarRemision')"><i class="ti ti-printer"></i> Generar remisión</button>`:''}
    </div>
  </div>`;
  if(!carritoRemision.length){
    h+=`<div class="empty" style="padding:16px"><i class="ti ti-file-text" style="color:#64B5F6"></i><span style="font-size:12px;color:#7A9BB5">El carrito está vacío.<br>Las salidas desde Laboratorio a servicios configurados se agregan aquí.</span></div>`;
  } else {
    h+=`<div class="card"><div class="card-body">`;
    carritoRemision.forEach((ci,idx)=>{
      h+=`<div class="row">
        <div style="flex:1;min-width:0">
          <div class="item-name">${txt(ci.name)}</div>
          <div class="item-sub">${ci.qty} ${txt(ci.unit)} · ${txt(ci.cat||'')} → <b style="color:#E8F4F2">${txt(ci.dest)}</b></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="window.quitarDeCarritoRemision(${idx})"><i class="ti ti-x"></i></button>
      </div>`;
    });
    h+=`</div></div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-ghost btn-sm" onclick="window.carritoRemision=[];render()"><i class="ti ti-trash"></i> Vaciar carrito</button>
    </div>`;
  }
  h+=`<div class="section-divider"></div><div class="sec-title" style="color:#64B5F6">Remisiones generadas</div>`;
  if(!remisiones.length){
    h+=`<div class="empty"><i class="ti ti-archive"></i><span>No hay remisiones aún</span></div>`;
  } else {
    remisiones.forEach(r=>{
      const tipoLbl={prestamo:'Préstamo',devolucion:'Devolución',traslado:'Traslado permanente',traslado_paila:'Traslado a La Paila',salida:'Salida a servicio'}[r.tipo]||r.tipo;
      h+=`<div class="pedido-card" onclick="window.imprimirRemision('${r.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
          <div style="font-weight:600;color:#E8F4F2;font-size:13px"><i class="ti ti-file-text" style="margin-right:4px;color:#64B5F6"></i>${txt(r.fecha||'Sin fecha')}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.imprimirRemision('${r.id}')"><i class="ti ti-printer"></i> Imprimir</button>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.doDeleteRemision('${r.id}')" title="Eliminar remisión"><i class="ti ti-trash" style="color:#E8484A"></i></button>
          </div>
        </div>
        <div style="font-size:11px;color:#7A9BB5">${r.items?.length||0} ítems · Dest: ${txt(r.destino||'')} · ${txt(tipoLbl)}</div>
      </div>`;
    });
  }
  return h;
}

window.agregarACarritoRemision=(d)=>{
  if(!carritoRemision) carritoRemision=[];
  carritoRemision.push(d);
  // Mostrar notificación breve
  const notif=document.createElement('div');
  notif.style.cssText='position:fixed;bottom:20px;right:20px;background:#64B5F6;color:#0F1923;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.4)';
  notif.textContent=`✓ ${d.name} agregado a remisiones`;
  document.body.appendChild(notif);
  setTimeout(()=>notif.remove(),2500);
  if(ST.tab==='remisiones') render();
};
window.quitarDeCarritoRemision=(idx)=>{ carritoRemision.splice(idx,1); render(); };

window.imprimirRemision=(id)=>{
  const r=remisiones.find(x=>x.id===id); if(!r) return;

};

function generarImpresionRemision(r){
  const itemsRows=r.items.map(i=>`
    <tr>
      <td style="padding:7px 10px;border:1px solid #ccc">${i.name}</td>
      <td style="padding:7px 10px;border:1px solid #ccc;text-align:center">${i.qty}</td>
      <td style="padding:7px 10px;border:1px solid #ccc;text-align:center">${i.unit}</td>
      <td style="padding:7px 10px;border:1px solid #ccc;text-align:center">${i.cat||''}</td>
    </tr>`).join('');
  const esPaila=r.tipo==='traslado_paila';
  const esManual=!!r.manual;
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>Remisión ${r.fecha}</title>

// ── SALIDAS ───────────────────────────────────────────────────────────────────
function renderSalidas(){
  // Estadística mensual
  const consumo={};
  salidas.forEach(e=>{
    let m=''; try{const p=e.time.split(', ')[0].split('/');if(p.length===3)m=`${p[2]}-${p[1].padStart(2,'0')}`;}catch{}
    if(!m) return;
    if(!consumo[m])consumo[m]={};
    const key=`${e.name}||${e.dest}`;
    if(!consumo[m][key])consumo[m][key]={name:e.name,dest:e.dest,unit:e.unit,qty:0};
    consumo[m][key].qty+=e.qty||0;
  });
  const meses=Object.keys(consumo).sort().reverse().slice(0,6);
  let h='';
  if(meses.length){
    h+=`<div class="sec-title">Estadística mensual de salidas</div>`;
    meses.forEach(m=>{
      const entries=Object.values(consumo[m]).sort((a,b)=>b.qty-a.qty).slice(0,15);
      const max=entries[0]?.qty||1;
      h+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:#E8484A;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid #2E4560">${mkLabel(m)}</div>`;
      entries.forEach(e=>{ h+=`<div class="chart-bar-wrap"><div class="chart-bar-label"><span>${txt(e.name)} <span style="color:#7A9BB5;font-size:10px">→ ${txt(e.dest)}</span></span><span style="color:#E8484A">${e.qty} ${txt(e.unit||'')}</span></div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(e.qty/max*100)}%;background:#E8484A"></div></div></div>`; });
      h+=`</div>`;
    });
    h+=`<div class="section-divider"></div>`;
  }
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="sec-title" style="margin:0;color:#E8484A">Historial de salidas (${salidas.length})</div>
    ${ST.adminUnlocked?`<button class="btn btn-danger btn-sm" onclick="if(confirm('¿Eliminar TODAS las salidas?'))window.doVaciarSalidas()"><i class="ti ti-trash"></i> Vaciar</button>`:`<button class="btn btn-ghost btn-sm" onclick="window.requireAdmin(()=>{ST.adminUnlocked=true;render();})"><i class="ti ti-lock"></i> Gestionar</button>`}
  </div>`;
  if(!salidas.length){
    h+=`<div class="empty"><i class="ti ti-door-exit"></i><span style="color:#7A9BB5">No hay salidas registradas aún.<br><span style="font-size:11px">Las salidas se registran al dar salida desde Almacén, Lab o La Paila.</span></span></div>`;
    return h;
  }
  h+=`<div class="card"><div class="card-body">`;
  salidas.forEach(e=>{
    const delBtn=ST.adminUnlocked?`<button class="btn btn-ghost btn-sm" onclick="window.doDeleteSalida('${e.id}')" title="Eliminar"><i class="ti ti-trash" style="color:#E8484A"></i></button>`:'';
    h+=`<div class="log-entry">
      <div class="log-icon" style="background:rgba(232,72,74,.12)"><span style="color:#E8484A">↑</span></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:#E8F4F2;font-weight:500">${txt(e.name)}</div>
        <div style="font-size:11px;color:#7A9BB5">${e.qty} ${txt(e.unit||'')} → <b style="color:#E8F4F2">${txt(e.dest||'')}</b> · ${txt(e.desde||'')} · ${txt(e.cat||'')}</div>
        <div style="font-size:10px;color:#7A9BB5;margin-top:1px">${e.fecha||''} ${e.hora||''}</div>
      </div>${delBtn}
    </div>`;
  });
  return h+`</div></div>`;
}

window.doVaciarPapelera=async()=>{
  closeM();
  const copia=[...papelera]; // snapshot local antes de que el listener actualice
  const total=copia.length;
  if(!total) return;
  const c=$('content');
  const prog=(n)=>{ if(c&&ST.tab==='papelera') c.innerHTML=`<div class="empty"><div class="spinner"></div><span style="color:#7A9BB5;margin-top:8px;display:block">Vaciando papelera (${n}/${total})...</span></div>`; };
  prog(0);
  let ok=0, errores=[];
  for(const e of copia){
    try{
      await deleteDoc(doc(db,'papelera',e.id));
      ok++;
      prog(ok);
    }catch(err){
      errores.push(e.id+': '+err.message);
    }
  }
  if(errores.length){
    alert(`Se eliminaron ${ok} de ${total}.\n\nErrores:\n${errores.slice(0,3).join('\n')}\n\nVerifica las reglas de Firestore.`);
  } else {
    if(c&&ST.tab==='papelera') c.innerHTML=`<div class="empty"><i class="ti ti-check" style="color:#4CAF7D;font-size:28px;display:block;margin-bottom:8px"></i><span style="color:#4CAF7D">Papelera vaciada correctamente</span></div>`;
  }
};

// Auto-limpieza de papelera: elimina entradas de más de 5 días al cargar
async function autoLimpiarPapelera(){
  try{
    const hace5dias=new Date(); hace5dias.setDate(hace5dias.getDate()-5);
    const viejos=papelera.filter(e=>{
      if(!e.deletedTime) return false;
      const d=parseTs(e.deletedTime); return d&&d<hace5dias;
    });
    if(!viejos.length) return;
    console.log(`Auto-limpiando ${viejos.length} entradas de papelera mayores a 5 días`);
    for(const e of viejos){
      try{ await deleteDoc(doc(db,'papelera',e.id)); }catch(err){}
    }
  }catch(err){}
}

  } else if(type==='remisionSvcs'){
    requireAdmin(()=>{
      const listH=()=>(cfg.services||[]).map((s,i)=>{
        const checked=(cfg.remisionServices||[]).includes(s);
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(46,69,96,.35)">
          <span style="font-size:13px;color:#E8F4F2">${txt(s)}</span>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <span style="font-size:11px;color:#7A9BB5">${checked?'Activo':'Inactivo'}</span>
            <input type="checkbox" id="remSvc_${i}" ${checked?'checked':''} style="width:16px;height:16px;cursor:pointer" onchange="window.toggleRemSvc('${s}',this.checked)">
          </label>
        </div>`;
      }).join('');
      area.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">
        <h3><i class="ti ti-file-text" style="color:#64B5F6"></i>Servicios que generan remisión</h3>
        <p style="color:#7A9BB5;font-size:12px;margin-bottom:10px">Al dar salida desde el laboratorio a estos servicios, la app preguntará si deseas agregar a remisiones.</p>
        <div id="remSvcList">${listH()}</div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeM()">Cerrar</button></div>
      </div></div>`;
    });

  } else if(type==='usoLimits'){
    requireAdmin(()=>{
      const rows=cfg.cats.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(46,69,96,.4)">
        <span style="font-size:13px;color:#E8F4F2">${txt(c)}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;color:#7A9BB5">máx. en uso simultáneos:</span>
          <input type="number" min="1" value="${cfg.usoLimits[c]||2}" data-uso-cat="${c}" style="width:55px;background:#0F1923;border:1px solid #2E4560;border-radius:5px;padding:4px 7px;color:#E8F4F2;-webkit-text-fill-color:#E8F4F2;font-size:13px;outline:none">
        </div>
      </div>`).join('');
      area.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">
        <h3><i class="ti ti-settings" style="color:#00C9B1"></i>Límites de uso simultáneo</h3>
        <div>${rows}</div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-accent" onclick="window.guardarLimites()"><i class="ti ti-check"></i> Guardar</button></div>
      </div></div>`;
    });
  }
};

window.saveCfg=saveCfg;
window.carritoRemision=carritoRemision;
window.toggleRemSvc=async(svc,checked)=>{
  if(!cfg.remisionServices) cfg.remisionServices=[];
  if(checked){ if(!cfg.remisionServices.includes(svc)) cfg.remisionServices.push(svc); }
  else{ cfg.remisionServices=cfg.remisionServices.filter(s=>s!==svc); }
  await saveCfg();
};
window.guardarLimites=async()=>{
  document.querySelectorAll("[data-uso-cat]").forEach(inp=>{
    const cat=inp.getAttribute("data-uso-cat");
    cfg.usoLimits[cat]=parseInt(inp.value)||2;
  });
  await saveCfg();
  closeM();
  alert("Límites guardados correctamente");
};
window.guardarPass=async()=>{
  const old=$('m-pass-old')?.value||'', nueva=$('m-pass-nueva')?.value||'', conf=$('m-pass-conf')?.value||'';
  const err=$('passErr');
  if(old!==cfg.password){if(err){err.textContent='Contraseña actual incorrecta';err.style.display='block';}return;}
  if(!nueva){if(err){err.textContent='Escribe una nueva contraseña';err.style.display='block';}return;}
  if(nueva!==conf){if(err){err.textContent='Las contraseñas no coinciden';err.style.display='block';}return;}
  cfg.password=nueva; await saveCfg(); closeM(); alert('Contraseña actualizada correctamente');
};

window.removeCat=async(i)=>{ cfg.cats.splice(i,1); await saveCfg(); $('catList').innerHTML=cfg.cats.map((c,j)=>`<div class="tag">${txt(c)}<button onclick="window.removeCat(${j})">✕</button></div>`).join(''); };
window.addCat=async()=>{ const v=$('newCat')?.value.trim(); if(!v) return; cfg.cats.push(v); await saveCfg(); $('newCat').value=''; $('catList').innerHTML=cfg.cats.map((c,j)=>`<div class="tag">${txt(c)}<button onclick="window.removeCat(${j})">✕</button></div>`).join(''); };
window.removeUnit=async(i)=>{ cfg.units.splice(i,1); await saveCfg(); $('unitList').innerHTML=cfg.units.map((u,j)=>`<div class="tag">${txt(u)}<button onclick="window.removeUnit(${j})">✕</button></div>`).join(''); };
window.addUnit=async()=>{ const v=$('newUnit')?.value.trim(); if(!v) return; cfg.units.push(v); await saveCfg(); $('newUnit').value=''; $('unitList').innerHTML=cfg.units.map((u,j)=>`<div class="tag">${txt(u)}<button onclick="window.removeUnit(${j})">✕</button></div>`).join(''); };
window.removeSvc=async(i)=>{ cfg.services.splice(i,1); await saveCfg(); $('svcList').innerHTML=cfg.services.map((s,j)=>`<div class="tag">${txt(s)}<button onclick="window.removeSvc(${j})">✕</button></div>`).join(''); };
window.addSvc=async()=>{ const v=$('newSvc')?.value.trim(); if(!v) return; cfg.services.push(v); await saveCfg(); $('newSvc').value=''; $('svcList').innerHTML=cfg.services.map((s,j)=>`<div class="tag">${txt(s)}<button onclick="window.removeSvc(${j})">✕</button></div>`).join(''); };

window.toggleAddLock=()=>{ if(ST.addLocked){requireAdmin(()=>{ST.addLocked=false;updateLockUI();});}else{ST.addLocked=true;updateLockUI();} };
window.tryNewItem=()=>{ if(!ST.addLocked) window.openM('addItem'); };
window.toggleUserMenu=()=>{ const m=$('userMenu'); if(m)m.style.display=m.style.display==='none'?'block':'none'; };
window.closeUserMenu=()=>{ const m=$('userMenu'); if(m)m.style.display='none'; };
document.addEventListener('click',e=>{ const w=$('userMenuWrap'); if(w&&!w.contains(e.target)) window.closeUserMenu(); });

// Expose ST for inline handlers
window.ST=ST;
</script>
</body>
</html>
